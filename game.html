<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏房间 - 不要抽到炸弹</title>
  <link rel="stylesheet" href="styles.css?v=14">
</head>
<body data-page="game">
  <div class="page-shell">
    <header class="hero">
      <div class="brand">
        <div class="logo">💣</div>
        <div>
          <h1>游戏房间</h1>
          <p class="tagline">匹配完成，准备进入下一局。</p>
        </div>
      </div>
      <div class="user-panel" id="userPanel"></div>
    </header>

    <main class="content">
      <section class="game-table-container">
        <!-- 游戏区域：包含牌桌和玩家 -->
        <div class="game-area">
          <!-- 游戏状态信息 -->
          <div class="game-status-bar">
            <div class="status-item">
              <span class="status-label">当前回合:</span>
              <span class="status-value" id="currentTurn">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">倒计时:</span>
              <span class="status-value countdown-timer" id="turnCountdown">5</span>
            </div>
            <div class="status-item">
              <span class="status-label">在线人数:</span>
              <span class="status-value" id="onlineCount">5/5</span>
            </div>
          </div>
          
          <!-- 玩家环形分布（牌桌外围） -->
          <div class="players-circle" id="playersCircle">
            <!-- 玩家将通过 JavaScript 动态生成 -->
          </div>
          
          <!-- 牌桌区域（居中） -->
          <div class="game-table">
            <!-- 底牌堆区域（左侧） -->
            <div class="deck-pile" id="deckPile">
              <div class="deck-stack" id="deckStack">
                <!-- 卡牌堆叠将通过 JavaScript 动态生成 -->
              </div>
              <div class="deck-count" id="deckCount">
                <span class="deck-number">28</span>
              </div>
              <div class="deck-placeholder" id="deckPlaceholder" style="display: none;">
                <div class="placeholder-icon">🃏</div>
                <div class="placeholder-text">底牌区</div>
              </div>
            </div>
            
            <!-- 出牌公示区（右侧，Issue #11） -->
            <div class="play-area" id="playArea">
              <div class="played-cards-container" id="playedCardsContainer">
                <!-- 已打出的牌将在这里显示 -->
              </div>
            </div>
          </div>
          
          <!-- 当前玩家指示器（箭头） -->
          <div class="turn-indicator" id="turnIndicator">
            <div class="arrow">▼</div>
          </div>
        </div>
        
        <!-- 游戏控制按钮（手牌区上方） -->
        <div class="game-controls">
          <button class="primary-button action-btn" id="drawCardBtn" disabled>抽牌</button>
          <button class="secondary-button action-btn" id="playCardBtn" disabled>出牌</button>
          <button class="tertiary-button action-btn" id="leaveRoomBtn">离开房间</button>
        </div>
        
        <!-- 手牌区域（中间位置） -->
        <div class="hand-area" id="handArea">
          <h3>我的手牌</h3>
          <div class="hand-cards" id="handCards">
            <!-- 手牌将在这里显示 -->
          </div>
          <div class="card-count">剩余卡牌: <span id="cardCount">0</span></div>
        </div>
      </section>
    </main>
  </div>

  <script src="main.js?v=14"></script>
</body>
</html>
