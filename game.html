<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏房间 - 不要抽到炸弹</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="game">
  <div class="page-shell">
    <header class="hero">
      <div class="brand">
        <div class="logo">💣</div>
        <div>
          <h1>游戏房间</h1>
          <p class="tagline">匹配完成，准备进入下一局。</p>
        </div>
      </div>
      <div class="user-panel" id="userPanel"></div>
    </header>

    <main class="content">
      <section class="game-table-container">
        <!-- 牌桌区域 -->
        <div class="game-table">
          <!-- 牌桌中央区域 -->
          <div class="table-center">
            <div class="deck-area">
              <div class="card-deck">🎴</div>
              <p class="table-message">游戏进行中...</p>
            </div>
          </div>
          
          <!-- 5个玩家位置 - 环形分布 -->
          <div class="players-circle" id="playersCircle">
            <!-- 玩家将通过 JavaScript 动态生成 -->
          </div>
          
          <!-- 当前玩家指示器（箭头） -->
          <div class="turn-indicator" id="turnIndicator">
            <div class="arrow">▼</div>
          </div>
        </div>
        
        <!-- 手牌区域 -->
        <div class="hand-area" id="handArea">
          <h3>我的手牌</h3>
          <div class="hand-cards" id="handCards">
            <!-- 手牌将在这里显示 -->
          </div>
          <div class="card-count">剩余卡牌: <span id="cardCount">0</span></div>
        </div>
        
        <!-- 游戏控制按钮 -->
        <div class="game-controls">
          <button class="primary-button" id="drawCardBtn" disabled>抽卡</button>
          <button class="secondary-button" id="leaveRoomBtn">离开房间</button>
        </div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
